<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отбор товаров Cults3D</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="app.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>Отбор товаров Cults3D</h2>
      <div class="stats" id="stats"></div>
    </div>

    <div id="actionButtons" class="action-buttons" style="display: none;">
      <button class="btn-add" id="addBtn">✅ Добавить товар</button>
      <button class="btn-skip" id="skipBtn">⏭️ Пропустить</button>
    </div>

    <div id="cardContainer" class="loading">Загрузка...</div>

    <footer>
      <div class="progress-info" id="progressInfo"></div>
      <button class="reset-btn" id="resetBtn">Сбросить прогресс</button>
    </footer>
  </div>

  <div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <button class="modal-prev" id="modalPrev">&#10094;</button>
    <img class="modal-content" id="modalImage">
    <button class="modal-next" id="modalNext">&#10095;</button>
  </div>
</body>

</html>
